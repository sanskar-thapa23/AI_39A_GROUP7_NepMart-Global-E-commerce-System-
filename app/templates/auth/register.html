{% extends "base.html" %}

{% block title %}Register Partner Account — Nep-Mart Global B2B{% endblock %}

{% block content %}
<div class="min-h-[90vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-brand-deep via-brand-dark to-brand-deep relative overflow-hidden">
  <!-- Glowing accent background blobs for premium aesthetic -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-brand/10 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-brand-crimson/10 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="max-w-xl w-full space-y-8 relative z-10">
    <!-- Brand badge/logo center -->
    <div class="text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-brand to-brand-crimson shadow-xl shadow-brand/35 mb-4 group hover:scale-105 transition-transform duration-300">
        <span class="font-serif font-bold text-2xl text-white">N</span>
      </div>
      <h2 class="font-serif text-3xl font-bold text-white tracking-tight">Join Nep-Mart B2B</h2>
      <p class="mt-2 text-sm text-brand-muted">
        Connect with premium verified buyers, manufacturers, and traders
      </p>
    </div>

    <!-- Registration Card -->
    <div class="glass-dark border border-white/10 rounded-3xl p-8 shadow-2xl backdrop-blur-md">
      <form class="space-y-5" action="{{ url_for('auth.register') }}" method="POST">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Role input group -->
          <div class="space-y-1 md:col-span-2">
            <label for="role" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">Account Type</label>
            <div class="relative rounded-xl shadow-sm">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
                <i data-lucide="briefcase" class="w-4 h-4"></i>
              </div>
              <select id="role" name="role" required
                class="block w-full pl-10 pr-4 py-2.5 bg-brand-dark border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm appearance-none">
                <option value="buyer" {% if default_role == 'buyer' %}selected{% endif %} class="bg-brand-dark text-white">Buyer / Customer</option>
                <option value="seller" {% if default_role == 'seller' %}selected{% endif %} class="bg-brand-dark text-white">Seller / Manufacturer / Trader</option>
              </select>
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-brand-muted/70">
                <i data-lucide="chevron-down" class="w-4 h-4"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Full name input group -->
          <div class="space-y-1">
            <label for="full_name" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">Full Name</label>
            <div class="relative rounded-xl shadow-sm">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
                <i data-lucide="user" class="w-4 h-4"></i>
              </div>
              <input id="full_name" name="full_name" type="text" required 
                class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-brand-muted/60 focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm" 
                placeholder="John Doe">
            </div>
          </div>

          <!-- Phone number input group -->
          <div class="space-y-1">
            <label for="phone" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">Phone Number</label>
            <div class="relative rounded-xl shadow-sm">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
                <i data-lucide="phone" class="w-4 h-4"></i>
              </div>
              <input id="phone" name="phone" type="text" required 
                class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-brand-muted/60 focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm" 
                placeholder="+977-9800000000">
            </div>
          </div>
        </div>

        <!-- Email input group -->
        <div class="space-y-1">
          <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">Email Address</label>
          <div class="relative rounded-xl shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </div>
            <input id="email" name="email" type="email" required 
              class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-brand-muted/60 focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm" 
              placeholder="name@example.com">
          </div>
        </div>

        <!-- SELLER SPECIFIC FIELDS -->
        <div id="seller-fields" class="space-y-4 pt-2 border-t border-white/5 hidden">
          <h3 class="text-sm font-semibold uppercase tracking-wider text-brand-crimson">Company Information</h3>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Business/Company Name -->
            <div class="space-y-1">
              <label for="business_name" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">Company Name</label>
              <div class="relative rounded-xl shadow-sm">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
                  <i data-lucide="building-2" class="w-4 h-4"></i>
                </div>
                <input id="business_name" name="business_name" type="text"
                  class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-brand-muted/60 focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm" 
                  placeholder="e.g. Kathmandu Handicrafts">
              </div>
            </div>

            <!-- WhatsApp Number -->
            <div class="space-y-1">
              <label for="whatsapp_number" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">WhatsApp Number</label>
              <div class="relative rounded-xl shadow-sm">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
                  <i data-lucide="message-square" class="w-4 h-4"></i>
                </div>
                <input id="whatsapp_number" name="whatsapp_number" type="text"
                  class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-brand-muted/60 focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm" 
                  placeholder="Include country code, e.g. 9779800000000">
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Business Phone -->
            <div class="space-y-1">
              <label for="business_phone" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">Business Phone</label>
              <div class="relative rounded-xl shadow-sm">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
                  <i data-lucide="phone-call" class="w-4 h-4"></i>
                </div>
                <input id="business_phone" name="business_phone" type="text"
                  class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-brand-muted/60 focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm" 
                  placeholder="Landline or mobile">
              </div>
            </div>

            <!-- Business Address -->
            <div class="space-y-1">
              <label for="business_address" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">Business Address</label>
              <div class="relative rounded-xl shadow-sm">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
                  <i data-lucide="map-pin" class="w-4 h-4"></i>
                </div>
                <input id="business_address" name="business_address" type="text"
                  class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-brand-muted/60 focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm" 
                  placeholder="City, District, Country">
              </div>
            </div>
          </div>
        </div>

        <!-- Password inputs grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Password input group -->
          <div class="space-y-1">
            <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">Password</label>
            <div class="relative rounded-xl shadow-sm">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
                <i data-lucide="lock" class="w-4 h-4"></i>
              </div>
              <input id="password" name="password" type="password" required 
                class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-brand-muted/60 focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm" 
                placeholder="Min 6 chars">
            </div>
          </div>

          <!-- Confirm Password input group -->
          <div class="space-y-1">
            <label for="confirm_password" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">Confirm Password</label>
            <div class="relative rounded-xl shadow-sm">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
                <i data-lucide="lock" class="w-4 h-4"></i>
              </div>
              <input id="confirm_password" name="confirm_password" type="password" required 
                class="block w-full pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-brand-muted/60 focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm" 
                placeholder="Repeat password">
            </div>
          </div>
        </div>

        <!-- Terms and conditions checkbox -->
        <div class="flex items-start">
          <input id="terms" name="terms" type="checkbox" required
            class="mt-1 h-4 w-4 rounded bg-white/5 border-white/10 text-brand-crimson focus:ring-brand-crimson/30 accent-brand-crimson">
          <label for="terms" class="ml-2.5 block text-xs text-brand-muted leading-snug">
            I agree to the <a href="#" class="text-white hover:text-brand-crimson underline">Terms of Platform Use</a>, <a href="#" class="text-white hover:text-brand-crimson underline">Privacy Policy</a> and authorize trade profile listing.
          </label>
        </div>

        <!-- CTA Submit Button -->
        <div>
          <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-brand-crimson hover:bg-brand-crimsonDark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-crimson shadow-lg shadow-brand-crimson/25 transition-all duration-150 transform hover:-translate-y-0.5 active:translate-y-0">
            <span class="absolute left-0 inset-y-0 flex items-center pl-3">
              <i data-lucide="user-plus" class="w-4 h-4 text-white/70 group-hover:text-white transition-colors"></i>
            </span>
            Create Partner Account
          </button>
        </div>
      </form>

      <!-- Redirect back to login -->
      <div class="mt-6 text-center text-sm text-brand-muted">
        Already have a partner account? 
        <a href="{{ url_for('auth.login') }}" class="font-semibold text-white hover:text-brand-crimson transition-colors ml-1">
          Sign in here
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const roleSelect = document.getElementById('role');
    const sellerFields = document.getElementById('seller-fields');
    const companyInput = document.getElementById('business_name');
    
    function toggleFields() {
      if (roleSelect.value === 'seller') {
        sellerFields.classList.remove('hidden');
        companyInput.setAttribute('required', 'required');
      } else {
        sellerFields.classList.add('hidden');
        companyInput.removeAttribute('required');
      }
    }
    
    roleSelect.addEventListener('change', toggleFields);
    // Trigger initially
    toggleFields();
  });
</script>
{% endblock %}
