{% extends "base.html" %}

{% block title %}Reset Password — Nep-Mart Global B2B{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-brand-deep via-brand-dark to-brand-deep relative overflow-hidden">
  <!-- Glowing accent background blobs for high premium feel -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-brand/10 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-brand-crimson/10 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="max-w-md w-full space-y-8 relative z-10">
    <!-- Brand badge/logo center -->
    <div class="text-center">
      <div class="inline-flex items-center  justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-brand to-brand-crimson shadow-xl shadow-brand/35 mb-4 group hover:scale-105 transition-transform duration-300">
        <span class="font-serif font-bold text-2xl text-white">N</span>
      </div>
      <h2 class="font-serif text-3xl font-bold text-white tracking-tight">Forgot Password?</h2>
      <p class="mt-2 text-sm text-brand-muted">
        Enter your email to receive recovery instructions
      </p>
    </div>

    <!-- Forgot Password Card -->
    <div class="glass-dark border border-white/10 rounded-3xl p-8 shadow-2xl backdrop-blur-md">
      <form class="space-y-6" action="{{ url_for('auth.forgot_password') }}" method="POST">
        
        <!-- Email input group -->
        <div class="space-y-1">
          <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-brand-muted">Corporate Email</label>
          <div class="relative rounded-xl shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-brand-muted/70">
              <i data-lucide="mail" class="w-5 h-5"></i>
            </div>
            <input id="email" name="email" type="email" required 
              class="block w-full pl-11 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-brand-muted/60 focus:outline-none focus:ring-2 focus:ring-brand-crimson/50 focus:border-brand-crimson transition-all text-sm" 
              placeholder="Enter your registered email">
          </div>
        </div>

        <!-- CTA Submit Button -->
        <div>
          <button type="submit" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-brand-crimson hover:bg-brand-crimsonDark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-crimson shadow-lg shadow-brand-crimson/25 transition-all duration-150 transform hover:-translate-y-0.5 active:translate-y-0">
            <span class="absolute left-0  inset-y-0 flex items-center pl-3">
              <i data-lucide="send" class="w-5 h-5 text-white/70 group-hover:text-white transition-colors"></i>
            </span>
            Send Reset Link
          </button>
        </div>
      </form>

      <!-- Back to Login -->
      <div class="mt-6 text-center">
        <a href="{{ url_for('auth.login') }}" class="inline-flex items-center gap-1  text-sm font-semibold text-white hover:text-brand-crimson transition-colors">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Sign in
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
